name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Gradle 8.2
      run: |
        curl -L -O https://services.gradle.org/distributions/gradle-8.2-bin.zip
        sudo unzip -d /opt gradle-8.2-bin.zip

    - name: Build with Gradle
      run: /opt/gradle-8.2/bin/gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: aimgstudio-debug
        path: app/build/outputs/apk/debug/app-debug.apk
